<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping & Organising</title>
</head>
<body>
    <div style="background-color:beige">
        <h1> my first blog post </h1>
        <p> this is my intoduction paragraph in HTML </p>
        <p>i love <span style="color: palevioletred;">travelling</span> </p>
    </div>

    <!-- tricks - p>p>p>p>p> -->
    <p>
        know u
        <p>
            i
            <p>
                do
                <p>
                    sup

                    <p>hii</p>
                </p>
            </p>
        </p>
    </p>

    <!-- trick article+section -->
    <article>dream</article>
    <section>for big </section>

    <!-- tricks - p{this is para } then enter  -->
    <p>this is my first paragraph</p>

    <!-- trick p#para1 -->
    <p id="para1"></p>

    <!-- article#article -->
    <article id="article1"></article>

    <!-- section#hello -->
    <section id="hello"></section>

    <!-- p.para -->
     <p class="para"></p>

     <!-- article.dog -->
      <article class="dog"></article>

      <!-- section.cat.lion.tiger -->
      <section class="cat lion tiger"></section>

      <!-- tricks - table>tr>td*2 -->
       <table>
        <tr>
            <td>2</td>
            <td>3</td>
        </tr>
       </table>

       <!-- tricks - ol>li*4 -->
         <ol>
            <li>ew</li>
            <li>yuck</li>
            <li>ick</li>
            <li>ahh</li>
         </ol>

</body>
</html>
